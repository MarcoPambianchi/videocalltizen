# C8 — nginx servant le client web interlocuteur sur le port 80.
server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    # En-têtes CORS permissifs (le client appelle token-service sur un autre port).
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # SPA : on retombe toujours sur index.html (les params token/url sont en query string).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Pas de cache sur les assets applicatifs pendant le dev.
    location ~* \.(?:js|css|html)$ {
        add_header Cache-Control "no-cache" always;
    }
}
