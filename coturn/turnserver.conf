# coturn — C5 (TURN). PROD uniquement (profil Docker 'turn').
# Indispensable pour les pairs derrière NAT symétrique (mobile). Inutile en test local.
listening-port=3478
tls-listening-port=5349

# Plage de relais (ne croise aucun port local connu).
min-port=49160
max-port=49200

# Authentification par secret partagé (doit correspondre à la section turn de LiveKit / TURN_SHARED_SECRET).
use-auth-secret
static-auth-secret=turnSharedSecret_dev_change_me_in_prod_0123
realm=visio.example.com

# Durcissement
no-multicast-peers
no-cli
fingerprint
stale-nonce=600

# En prod : décommenter et fournir les certificats Let's Encrypt
# cert=/etc/letsencrypt/live/visio.example.com/fullchain.pem
# pkey=/etc/letsencrypt/live/visio.example.com/privkey.pem
# external-ip=<IP_PUBLIQUE>
